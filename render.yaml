services:
  - type: web
    name: kweens-drag-race
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 24.14.1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: drag-media
      - key: STAFF_USER
        value: admin
      - key: STAFF_PASSWORD
        sync: false
