<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Staff — Kweens Drag Race</title><link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/styles.css"><link rel="stylesheet" href="css/staff.css"><script src="js/staff.js" defer></script></head><body class="staff"><main><section class="staff-login" id="login"><div class="brand-image"><img src="assets/images/logo-kweens-transparent.png" alt="Kweens Drag Race"></div><p class="kicker">Acesso restrito</p><h1>Portal Staff</h1><form id="loginForm"><label>Usuário<input name="username" autocomplete="username" required></label><label>Senha<input type="password" name="password" autocomplete="current-password" required></label><small class="error" id="loginError"></small><button class="btn crystal">Entrar</button></form></section><section class="staff-app" id="app" hidden><header class="staff-top"><div><p class="kicker">Portal Staff</p><h1>Inscrições</h1></div><div><span id="staffName"></span><button class="btn secondary" id="logout">Sair</button></div></header><div class="staff-filters"><input id="search" placeholder="Buscar nome, drag, protocolo..."><select id="status"><option value="">Todos os status</option><option>recebida</option><option>em triagem</option><option>pré-selecionada</option><option>entrevista</option><option>aprovada</option><option>não selecionada</option><option>desclassificada</option></select></div><div class="staff-layout"><div class="application-list" id="list" aria-live="polite"></div><aside class="application-detail" id="detail"><div class="empty">Selecione uma inscrição para visualizar.</div></aside></div></section></main></body></html>
